name: Android — Build (CI)

# Runs on every push and on pull requests.
# Builds a debug APK (always) and a signed release AAB (when signing secrets exist).
# Download artifacts from the Actions run page.
on:
  push:
  pull_request:
  workflow_dispatch:  # manual trigger from Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      HAS_SIGNING_SECRETS: ${{ secrets.KEYSTORE_BASE64 != '' }}

    steps:
      # ── Source ───────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Toolchain ────────────────────────────────────────────────────────────
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # ── Web → Android sync ───────────────────────────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      - name: Sync web assets into Android project
        run: npx cap sync android

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: |
          ./gradlew assembleDebug --no-daemon \
            -Pandroid.injected.version.code=${{ github.run_number }} \
            -Pandroid.injected.version.name=1.0.0

      # ── Signed release AAB (only when signing secrets are configured) ────────
      - name: Decode keystore
        if: env.HAS_SIGNING_SECRETS == 'true'
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/keystore.jks

      - name: Build signed release AAB
        if: env.HAS_SIGNING_SECRETS == 'true'
        working-directory: android
        run: |
          ./gradlew bundleRelease --no-daemon \
            -Pandroid.injected.version.code=${{ github.run_number }} \
            -Pandroid.injected.version.name=1.0.0 \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/android/keystore.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Remove keystore
        if: always()
        run: rm -f android/keystore.jks

      # ── Artifacts ────────────────────────────────────────────────────────────
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: squigglebug-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: Upload signed release AAB
        if: env.HAS_SIGNING_SECRETS == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: squigglebug-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 90
