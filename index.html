<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Squigglebug">
<meta name="description" content="A magical drawing app for babies and toddlers">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Squigglebug</title>

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-E7X477D1W8"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-E7X477D1W8');

  // Track PWA installs
  window.addEventListener('beforeinstallprompt', () => {
    gtag('event', 'pwa_install_prompt');
  });
  window.addEventListener('appinstalled', () => {
    gtag('event', 'pwa_installed');
  });
</script>

<!-- Service Worker -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js');
    });
  }
</script>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #fff;
    overflow: hidden;
    height: 100dvh;
    width: 100dvw;
    touch-action: none;
  }
  #bg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    background: hsl(0, 60%, 94%);
    transition: none;
  }
  canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100dvw;
    height: 100dvh;
    touch-action: none;
  }
  #trail   { z-index: 1; }
  #sparkle { z-index: 2; pointer-events: none; }
</style>
</head>
<body>

<div id="bg"></div>
<canvas id="trail"></canvas>
<canvas id="sparkle"></canvas>

<script>
  const trailCanvas   = document.getElementById('trail');
  const sparkleCanvas = document.getElementById('sparkle');
  const tc = trailCanvas.getContext('2d');
  const sc = sparkleCanvas.getContext('2d');

  const TRAIL_MS  = 5000;
  const MIN_WIDTH = 6;
  const MAX_WIDTH = 36;
  let hue = 0;

  const fingers  = {};
  const segments = [];
  const sparkles = [];

  // ── Resize ────────────────────────────────────────────────────────────────
  function resize() {
    const dpr = window.devicePixelRatio || 1;
    const w = window.innerWidth;
    const h = window.innerHeight;
    for (const cvs of [trailCanvas, sparkleCanvas]) {
      cvs.width  = w * dpr;
      cvs.height = h * dpr;
      const c = cvs.getContext('2d');
      c.scale(dpr, dpr);
      c.lineCap  = 'round';
      c.lineJoin = 'round';
    }
  }

  // ── Trail ─────────────────────────────────────────────────────────────────
  function drawSegment(s) {
    tc.beginPath();
    if (s.isDot) {
      tc.arc(s.x1, s.y1, s.w / 2, 0, Math.PI * 2);
      tc.fillStyle = `hsl(${s.hue}, 100%, 50%)`;
      tc.fill();
    } else {
      tc.moveTo(s.x1, s.y1);
      tc.quadraticCurveTo(s.cpx, s.cpy, s.cx, s.cy);
      tc.strokeStyle = `hsl(${s.hue}, 100%, 50%)`;
      tc.lineWidth   = s.w;
      tc.stroke();
    }
  }

  function redrawTrails() {
    const now = Date.now();
    tc.clearRect(0, 0, window.innerWidth, window.innerHeight);
    while (segments.length && now - segments[0].t >= TRAIL_MS) segments.shift();
    for (const s of segments) drawSegment(s);
  }

  // ── Sparkles ──────────────────────────────────────────────────────────────
  function spawnSparkles(x, y, h) {
    for (let i = 0; i < 10; i++) {
      const angle = (Math.PI * 2 * i) / 10 + Math.random() * 0.5;
      const speed = 2.5 + Math.random() * 4;
      sparkles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        r: 3 + Math.random() * 4,
        hue: (h + Math.random() * 40 - 20 + 360) % 360,
        born: Date.now(),
        life: 400 + Math.random() * 200
      });
    }
  }

  function redrawSparkles() {
    const now = Date.now();
    sc.clearRect(0, 0, window.innerWidth, window.innerHeight);
    for (let i = sparkles.length - 1; i >= 0; i--) {
      const s = sparkles[i];
      const age = now - s.born;
      if (age > s.life) { sparkles.splice(i, 1); continue; }
      s.x += s.vx; s.y += s.vy;
      s.vx *= 0.90; s.vy *= 0.90;
      const alpha = 1 - age / s.life;
      sc.beginPath();
      sc.arc(s.x, s.y, s.r * alpha, 0, Math.PI * 2);
      sc.fillStyle = `hsla(${s.hue}, 100%, 55%, ${alpha})`;
      sc.fill();
    }
  }

  // ── Background tint ───────────────────────────────────────────────────────
  const bg = document.getElementById('bg');
  let bgHue = 0;

  function updateBg() {
    let diff = hue - bgHue;
    if (diff > 180) diff -= 360;
    if (diff < -180) diff += 360;
    bgHue = (bgHue + diff * 0.02 + 360) % 360;
    bg.style.background = `hsl(${bgHue}, 60%, 94%)`;
  }

  // ── Input ─────────────────────────────────────────────────────────────────
  function speedToWidth(dist) {
    return Math.max(MIN_WIDTH, MAX_WIDTH - Math.min(dist * 1.2, MAX_WIDTH - MIN_WIDTH));
  }

  function startFinger(id, x, y) {
    fingers[id] = { pts: [{ x, y }], lastX: x, lastY: y, w: MAX_WIDTH };
    spawnSparkles(x, y, hue);
    segments.push({ isDot: true, x1: x, y1: y, w: MAX_WIDTH, hue, t: Date.now() });
    hue = (hue + 2) % 360;
  }

  function moveFinger(id, x, y) {
    const f = fingers[id];
    if (!f) return;
    const dist = Math.hypot(x - f.lastX, y - f.lastY);
    if (dist < 2) return;
    f.pts.push({ x, y });
    const pts = f.pts;
    const len = pts.length;
    if (len >= 2) {
      const p0 = pts[len - 2];
      const p1 = pts[len - 1];
      const mx = (p0.x + p1.x) / 2;
      const my = (p0.y + p1.y) / 2;
      f.w = f.w + (speedToWidth(dist) - f.w) * 0.08;
      segments.push({
        isDot: false,
        x1:  pts[len - 3] ? (pts[len - 3].x + p0.x) / 2 : p0.x,
        y1:  pts[len - 3] ? (pts[len - 3].y + p0.y) / 2 : p0.y,
        cpx: p0.x, cpy: p0.y,
        cx: mx, cy: my,
        w: f.w, hue, t: Date.now()
      });
      hue = (hue + 2) % 360;
    }
    f.lastX = x;
    f.lastY = y;
  }

  function endFinger(id) { delete fingers[id]; }

  // ── Main loop ─────────────────────────────────────────────────────────────
  function loop() {
    redrawTrails();
    redrawSparkles();
    updateBg();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  // ── Mouse events ──────────────────────────────────────────────────────────
  let mouseDown = false;
  trailCanvas.addEventListener('mousedown',  e => { mouseDown = true; startFinger('mouse', e.clientX, e.clientY); });
  trailCanvas.addEventListener('mousemove',  e => { if (mouseDown) moveFinger('mouse', e.clientX, e.clientY); });
  trailCanvas.addEventListener('mouseup',    () => { mouseDown = false; endFinger('mouse'); });
  trailCanvas.addEventListener('mouseleave', () => { mouseDown = false; endFinger('mouse'); });

  // ── Touch events ──────────────────────────────────────────────────────────
  trailCanvas.addEventListener('touchstart', e => {
    e.preventDefault();
    for (const t of e.changedTouches) startFinger(t.identifier, t.clientX, t.clientY);
  }, { passive: false });
  trailCanvas.addEventListener('touchmove', e => {
    e.preventDefault();
    for (const t of e.changedTouches) moveFinger(t.identifier, t.clientX, t.clientY);
  }, { passive: false });
  trailCanvas.addEventListener('touchend', e => {
    e.preventDefault();
    for (const t of e.changedTouches) endFinger(t.identifier);
  }, { passive: false });

  // ── Clear ─────────────────────────────────────────────────────────────────
  function clear() {
    segments.length = 0;
    sparkles.length = 0;
    tc.clearRect(0, 0, window.innerWidth, window.innerHeight);
    sc.clearRect(0, 0, window.innerWidth, window.innerHeight);
    bgHue = 0;
    bg.style.background = `hsl(0, 60%, 94%)`;
    gtag('event', 'canvas_cleared');
  }

  trailCanvas.addEventListener('dblclick', clear);

  let lastTap = 0;
  const tapMoved = {};
  trailCanvas.addEventListener('touchstart', e => {
    for (const t of e.changedTouches) tapMoved[t.identifier] = false;
  }, { passive: false });
  trailCanvas.addEventListener('touchmove', e => {
    for (const t of e.changedTouches) tapMoved[t.identifier] = true;
  }, { passive: false });
  trailCanvas.addEventListener('touchend', e => {
    for (const t of e.changedTouches) {
      const wasTap = !tapMoved[t.identifier];
      delete tapMoved[t.identifier];
      if (wasTap && e.touches.length === 0) {
        const now = Date.now();
        if (now - lastTap < 350) clear();
        lastTap = now;
      }
    }
  });

  // ── Shake to clear ────────────────────────────────────────────────────────
  let lastAx = 0, lastAy = 0, lastAz = 0, lastShake = 0;
  window.addEventListener('devicemotion', e => {
    const a = e.accelerationIncludingGravity;
    if (!a) return;
    const delta = Math.abs(a.x - lastAx) + Math.abs(a.y - lastAy) + Math.abs(a.z - lastAz);
    lastAx = a.x; lastAy = a.y; lastAz = a.z;
    if (delta > 40 && Date.now() - lastShake > 1000) {
      lastShake = Date.now();
      clear();
    }
  });

  window.addEventListener('resize', resize);
  resize();
</script>
</body>
</html>
