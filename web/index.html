<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Squigglebug">
  <meta name="description" content="A magical drawing app for babies and toddlers">
  <meta name="theme-color" content="#fce4ec">
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self';
    connect-src 'self';
    img-src 'self' data:;
    style-src 'self';
  ">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <link rel="stylesheet" href="style.css">
  <title>Squigglebug</title>

  <!-- Version — also loaded by sw.js via importScripts; bump to bust the SW cache -->
  <script src="version.js" defer></script>

  <script src="app.js" type="module"></script>
</head>
<body>
  <div id="bg"></div>
  <canvas id="trail"></canvas>
  <canvas id="sparkle"></canvas>
</body>
</html>
